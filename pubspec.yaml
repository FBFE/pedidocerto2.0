name: pedidocerto
description: Sistema Pedido Certo - Flutter Web.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  go_router: ^14.0.0
  http: ^1.2.0
  provider: ^6.1.0
  supabase_flutter: ^2.0.0
  file_picker: ^8.0.0
  fl_chart: ^0.66.0
  intl: ^0.20.2
  spreadsheet_decoder: ^2.3.0
  shared_preferences: ^2.3.0
  uuid: ^4.0.0
  supabase: ^2.10.2
  archive: ^3.6.1
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/coolblue/
    - assets/backgrounds/
    - assets/icons/svg/
    - assets/icons/png/
    - assets/illustrations/
    # - assets/fonts/   # descomente se usar fontes custom
